name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Pin Node 20 LTS Iron — default npm 10.8.2 already installed
          # Skip 'cache: npm' (cache mostly empty on GH Runner, 675B observed)
          node-version: '20'

      - name: Install dependencies
        # Use npm 9.x (not 10.x) — npm 10 has known 1m12s hang on GH Runner registry
        # (npm/cli#7006 confirmed: npm 10.x "Exit handler never called" 100% reproducible)
        # Node 20 ships npm 10.8.2 by default; we override to npm@9 via global install
        # npm install (not ci) tolerates lockfile drift
        # --prefer-offline: minimize registry roundtrips
        # timeout + grep "^npm error" + exit 1: catch silent npm failures
        run: |
          set -e
          npm install -g npm@9 --silent
          npm install --prefer-offline --no-audit --no-fund --ignore-scripts 2>&1 | tee /tmp/npm-ci.log
          if grep -q "^npm error" /tmp/npm-ci.log; then
            echo "::error::npm install reported errors (likely hang, node_modules incomplete)"
            exit 1
          fi
        timeout-minutes: 5
        env:
          # npm "Exit handler never called" bug 偶发, 关 telemetry/fund/audit
          NPM_CONFIG_FUND: 'false'
          NPM_CONFIG_AUDIT: 'false'
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'

      - name: Build VitePress
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
