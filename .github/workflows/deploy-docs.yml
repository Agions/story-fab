name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Pin Node 20 LTS Iron — default npm 10.8.2 already installed
          # Skip 'cache: npm' (cache mostly empty on GH Runner, 675B observed)
          node-version: '20'

      - name: Install dependencies
        # npm install (not ci) tolerates lockfile drift; npm ci is stricter + 100% hang on GH Runner
        # --prefer-offline: 优先使用 cache, 避免 GitHub Runner npm registry 慢响应触发
        # "Exit handler never called" 1m12s hang (npm/cli#7006) — 100% 复现于 ubuntu-latest + Node 22
        # npm prints error but exits 0 → node_modules incomplete → 后续 steps 失败
        # || 兜底: 检测 "npm error" 字符串, 强制 fail
        # timeout-minutes 短, hang 时 fail-fast 而不是静默 1m12s
        run: |
          set -e
          npm install --prefer-offline --no-audit --no-fund --ignore-scripts 2>&1 | tee /tmp/npm-ci.log
          if grep -q "^npm error" /tmp/npm-ci.log; then
            echo "::error::npm install reported errors (likely hang, node_modules incomplete)"
            exit 1
          fi
        timeout-minutes: 5
        env:
          # npm "Exit handler never called" bug 偶发, 关 telemetry/fund/audit
          NPM_CONFIG_FUND: 'false'
          NPM_CONFIG_AUDIT: 'false'
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'

      - name: Build VitePress
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
