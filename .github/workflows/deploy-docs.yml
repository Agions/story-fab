name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm (workaround Runner Node 24 + default npm 10.x hang)
        run: npm install -g npm@10.8.2

      - name: Install dependencies
        # --prefer-offline: 优先使用 cache, 避免 GitHub Runner npm registry 慢响应触发
        # "Exit handler never called" 1m12s hang (npm/cli#7006) — 100% 复现于 ubuntu-latest + Node 22
        # timeout-minutes 短, hang 时 fail-fast 而不是静默 1m12s
        run: npm ci --prefer-offline --no-audit --no-fund --ignore-scripts
        timeout-minutes: 3
        env:
          # npm "Exit handler never called" bug 偶发, 关 telemetry/fund/audit
          NPM_CONFIG_FUND: 'false'
          NPM_CONFIG_AUDIT: 'false'
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'

      - name: Build VitePress
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
