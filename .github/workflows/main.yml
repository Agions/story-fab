name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Pin Node 20 LTS Iron — ubuntu-22.04 Runner image (default is ubuntu-24.04
          # which has DNS/network regression causing npm 1m12s hang)
          node-version: '20'
      - name: Install dependencies
        # Use npm 9.x (not 10.x) — npm 10 has known 1m12s hang on GH Runner
        # (npm/cli#7006 confirmed: "Exit handler never called" 100% reproducible)
        # Rewrite lockfile: tencentyun mirror (China-only) → npmjs.org (lockfile has 207 entries
        # pinning to tencentyun, GH Runner DNS ENOTFOUND for this China-only mirror)
        # --registry flag alone doesn't override hardcoded URLs in lockfile
        run: |
          set -e
          npm install -g npm@9 --silent
          sed -i 's|http://mirrors.tencentyun.com/npm/|https://registry.npmjs.org/|g' package-lock.json
          npm install --prefer-offline --no-audit --no-fund 2>&1 | tee /tmp/npm-ci.log
          if grep -q "^npm ERR" /tmp/npm-ci.log; then
            echo "::error::npm install reported errors"
            exit 1
          fi
        timeout-minutes: 8
        env:
          # npm "Exit handler never called" bug 偶发, 关 telemetry/fund/audit
          NPM_CONFIG_FUND: 'false'
          NPM_CONFIG_AUDIT: 'false'
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'
      - name: TypeScript check
        run: |
          mkdir -p reports
          tsc --noEmit --pretty false > reports/tsc-report.txt 2>&1 || true
          grep "^src/" reports/tsc-report.txt > reports/tsc-report-src.txt || true
          if grep -q "^src/" reports/tsc-report-src.txt; then
            echo "TypeScript errors found in src/"
            cat reports/tsc-report-src.txt
            exit 1
          fi
      - name: Upload TypeScript report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: tsc-report
          path: reports/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Pin Node 20 LTS Iron — ubuntu-22.04 Runner image (default is ubuntu-24.04
          # which has DNS/network regression causing npm 1m12s hang)
          node-version: '20'
      - name: Install dependencies
        # Use npm 9.x (not 10.x) — npm 10 has known 1m12s hang on GH Runner
        # (npm/cli#7006 confirmed: "Exit handler never called" 100% reproducible)
        # Rewrite lockfile: tencentyun mirror (China-only) → npmjs.org (lockfile has 207 entries
        # pinning to tencentyun, GH Runner DNS ENOTFOUND for this China-only mirror)
        # --registry flag alone doesn't override hardcoded URLs in lockfile
        run: |
          set -e
          npm install -g npm@9 --silent
          sed -i 's|http://mirrors.tencentyun.com/npm/|https://registry.npmjs.org/|g' package-lock.json
          npm install --prefer-offline --no-audit --no-fund 2>&1 | tee /tmp/npm-ci.log
          if grep -q "^npm ERR" /tmp/npm-ci.log; then
            echo "::error::npm install reported errors"
            exit 1
          fi
        timeout-minutes: 8
        env:
          # npm "Exit handler never called" bug 偶发, 关 telemetry/fund/audit
          NPM_CONFIG_FUND: 'false'
          NPM_CONFIG_AUDIT: 'false'
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'
      - name: Create reports directory
        run: mkdir -p reports
      - name: ESLint
        run: npm run lint
      - name: ESLint JSON report
        run: npx eslint src --format json --output-file reports/eslint-report.json
        continue-on-error: true
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: eslint-report
          path: reports/
          retention-days: 7

  coverage:
    name: Coverage Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Pin Node 20 LTS Iron — ubuntu-22.04 Runner image (default is ubuntu-24.04
          # which has DNS/network regression causing npm 1m12s hang)
          node-version: '20'
      - name: Install dependencies
        # Use npm 9.x (not 10.x) — npm 10 has known 1m12s hang on GH Runner
        # (npm/cli#7006 confirmed: "Exit handler never called" 100% reproducible)
        # Rewrite lockfile: tencentyun mirror (China-only) → npmjs.org (lockfile has 207 entries
        # pinning to tencentyun, GH Runner DNS ENOTFOUND for this China-only mirror)
        # --registry flag alone doesn't override hardcoded URLs in lockfile
        run: |
          set -e
          npm install -g npm@9 --silent
          sed -i 's|http://mirrors.tencentyun.com/npm/|https://registry.npmjs.org/|g' package-lock.json
          npm install --prefer-offline --no-audit --no-fund 2>&1 | tee /tmp/npm-ci.log
          if grep -q "^npm ERR" /tmp/npm-ci.log; then
            echo "::error::npm install reported errors"
            exit 1
          fi
        timeout-minutes: 8
        env:
          # npm "Exit handler never called" bug 偶发, 关 telemetry/fund/audit
          NPM_CONFIG_FUND: 'false'
          NPM_CONFIG_AUDIT: 'false'
          NPM_CONFIG_UPDATE_NOTIFIER: 'false'
      - name: Create reports directory
        run: mkdir -p reports
      - name: Coverage with JSON reporter
        run: npm run test:ci
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  quality-gate:
    name: PR Quality Gate
    needs: [lint, typecheck, coverage]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Download coverage report
        uses: actions/download-artifact@v5
        with:
          name: coverage-report
          path: coverage/
      - name: Download all reports
        uses: actions/download-artifact@v5
        with:
          pattern: '!(coverage-report)'
          path: reports/
          merge-multiple: true
      - name: ESLint warnings check
        run: |
          ESLINT_COUNT=$(cat reports/eslint-report.json 2>/dev/null | grep -c '"severity":\s*1' || echo "0")
          echo "ESLint warnings: $ESLINT_COUNT"
          if [ "$ESLINT_COUNT" -gt 250 ]; then
            echo "ESLint warnings ($ESLINT_COUNT) exceed threshold of 250"
            exit 1
          fi
          echo "ESLint warnings within limit"
      - name: Coverage threshold check
        run: |
          if [ ! -f coverage/coverage-final.json ]; then
            echo "Coverage report not found, skipping check"
            exit 0
          fi
          if [ ! -f scripts/compute-coverage.py ]; then
            echo "compute-coverage.py not found, skipping check"
            exit 0
          fi
          COVERAGE=$(python3 scripts/compute-coverage.py)
          echo "Coverage: ${COVERAGE}%"
          # Coverage of 0% means no coverage data — skip instead of failing
          if [ "$COVERAGE" = "0" ] || [ -z "$COVERAGE" ]; then
            echo "No coverage data generated, skipping check"
            exit 0
          fi
          COVERAGE_INT=$(printf "%.0f" "$COVERAGE" 2>/dev/null || echo "0")
          if [ "$COVERAGE_INT" -lt 30 ]; then
            echo "Coverage (${COVERAGE}%) below threshold of 30%"
            exit 1
          fi
          echo "Coverage meets threshold"
      - name: TypeScript errors check
        run: |
          # Only check src/ files — node_modules errors are expected and ignored
          if [ -f reports/tsc-report-src.txt ]; then
            SRC_ERRORS=$(grep -c "error TS" reports/tsc-report-src.txt || echo "0")
            echo "TypeScript errors in src/: $SRC_ERRORS"
            if [ "$SRC_ERRORS" -gt 0 ]; then
              echo "TypeScript errors found in src/:"
              grep "error TS" reports/tsc-report-src.txt | head -10
              exit 1
            fi
            echo "TypeScript check passed"
          else
            echo "TypeScript src report not found (typecheck job may have passed)"
          fi

  build:
    name: Vite Build
    needs: [typecheck, lint]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        # Use npm 9.x (not 10.x) — npm 10 has known 1m12s hang on GH Runner
        # Rewrite lockfile: tencentyun mirror → npmjs.org
        run: |
          set -e
          npm install -g npm@9 --silent
          sed -i 's|http://mirrors.tencentyun.com/npm/|https://registry.npmjs.org/|g' package-lock.json
          npm install --prefer-offline --no-audit --no-fund 2>&1 | tee /tmp/npm-ci.log
          if grep -q "^npm ERR" /tmp/npm-ci.log; then
            echo "::error::npm install reported errors"
            exit 1
          fi
        timeout-minutes: 8
      - name: Build
        run: npm run build
      - name: Bundle budget check
        run: npm run build:budget
      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 7

  rust:
    name: Rust Check
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        # Use npm 9.x + npmjs.org registry (see main typecheck/lint for full rationale)
        run: |
          set -e
          npm install -g npm@9 --silent
          sed -i 's|http://mirrors.tencentyun.com/npm/|https://registry.npmjs.org/|g' package-lock.json
          npm install --prefer-offline --no-audit --no-fund 2>&1 | tee /tmp/npm-ci.log
          if grep -q "^npm ERR" /tmp/npm-ci.log; then
            echo "::error::npm install reported errors"
            exit 1
          fi
        timeout-minutes: 8
      - name: Build frontend
        run: npm run build
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Cargo check
        run: |
          set -e
          cd src-tauri
          cargo --version && rustc --version
          cargo check 2>&1
      - name: Upload cargo report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cargo-report
          path: src-tauri/target/
          retention-days: 1

  rust-tests:
    name: Rust Tests (resilience)
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      # P1 fix: cargo test --test resilience compiles the full src-tauri
      # crate, which transitively depends on tauri / gtk-rs / glib-sys.
      # The CI runner's ubuntu-latest image ships pkg-config but not the
      # glib-2.0 / gtk-3 / webkit2gtk .pc files, so the build fails with
      # "Package glib-2.0 was not found in the pkg-config search path"
      # before any test runs. Install the same system libs that the
      # `rust` (cargo check) job installs at line 174-175.
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        # Use npm 9.x + npmjs.org registry (see main typecheck/lint for full rationale)
        run: |
          set -e
          npm install -g npm@9 --silent
          sed -i 's|http://mirrors.tencentyun.com/npm/|https://registry.npmjs.org/|g' package-lock.json
          npm install --prefer-offline --no-audit --no-fund 2>&1 | tee /tmp/npm-ci.log
          if grep -q "^npm ERR" /tmp/npm-ci.log; then
            echo "::error::npm install reported errors"
            exit 1
          fi
        timeout-minutes: 8
      - name: Build frontend
        run: npm run build
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Run the integration tests for utils::resilience (panic hook +
      # ResourceLimiter). These live in src-tauri/tests/ as an independent
      # crate so they are not blocked by the 6 pre-existing lib-test errors
      # in ffmpeg_builder.rs / utils/mod.rs. See commit 839cca17.
      - name: Run resilience integration tests
        run: |
          set -e
          cd src-tauri
          cargo --version && rustc --version
          cargo test --test resilience --no-fail-fast 2>&1
      - name: Run crash recovery integration tests
        run: |
          set -e
          cd src-tauri
          cargo test --test crash_recovery --no-fail-fast 2>&1
      # P2: pure-function integration tests for the audio-mixing pipeline
      # (`pcm_samples_from_wav` + `parse_has_audio`). These cover logic
      # that is not exercised by the GUI's ffmpeg smoke tests and can run
      # on a CI runner that has no ffmpeg binary installed.
      - name: Run audio mix integration tests
        run: |
          set -e
          cd src-tauri
          cargo --version && rustc --version
          cargo test --test audio_mix --no-fail-fast 2>&1
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: rust-tests-log
          path: src-tauri/target/
          retention-days: 3

  reports:
    name: Quality Reports
    needs: [lint, typecheck, coverage]
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Pin Node 20 LTS Iron — default npm 10.8.2 already installed
          # 'cache: npm' was returning 675B (empty) — GH cache key collision
          # Manually cache ~/.npm (download cache) + node_modules (avoid re-extract)
          node-version: '20'
      - name: Cache npm + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          # Cache key based on lockfile hash — invalidates when lock changes
          key: ${{ runner.os }}-node20-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-npm-
            ${{ runner.os }}-node-
      - name: Download all reports
        uses: actions/download-artifact@v5
        with:
          pattern: '*-report'
          path: reports/
          merge-multiple: true
      - name: List reports
        run: ls -la reports/
      - name: Run code quality dashboard
        run: |
          if [ -f scripts/code-review-dashboard.mjs ]; then
            node scripts/code-review-dashboard.mjs --json
          else
            echo "code-review-dashboard.mjs not found, skipping dashboard generation"
          fi
      - name: Upload all reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: quality-reports
          path: reports/
          retention-days: 7