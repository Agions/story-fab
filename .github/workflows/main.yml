name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Create reports directory
        run: mkdir -p reports
      - name: TypeScript check
        run: tsc --noEmit --pretty false 2>&1 | tee reports/tsc-report.txt; exit ${PIPESTATUS[0]}
      - name: Upload TypeScript report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsc-report
          path: reports/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Create reports directory
        run: mkdir -p reports
      - name: ESLint
        run: pnpm run lint
      - name: ESLint JSON report
        run: pnpm exec eslint src --format json --output-file reports/eslint-report.json
        continue-on-error: true
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: reports/
          retention-days: 7

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Create reports directory
        run: mkdir -p reports
      - name: Coverage with JSON reporter
        run: pnpm run test:ci
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  quality-gate:
    name: PR Quality Gate
    needs: [lint, typecheck, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: '!(coverage-report)'
          path: reports/
          merge-multiple: true
      - name: ESLint warnings check
        run: |
          ESLINT_COUNT=$(cat reports/eslint-report.json 2>/dev/null | grep -c '"severity":\s*1' || echo "0")
          echo "ESLint warnings: $ESLINT_COUNT"
          if [ "$ESLINT_COUNT" -gt 250 ]; then
            echo "ESLint warnings ($ESLINT_COUNT) exceed threshold of 250"
            exit 1
          fi
          echo "ESLint warnings within limit"
      - name: Coverage threshold check
        run: |
          if [ -f coverage/coverage-final.json ]; then
            COVERAGE=$(python3 scripts/compute-coverage.py)
            echo "Coverage: ${COVERAGE}%"
            COVERAGE_INT=$(printf "%.0f" "$COVERAGE")
            if [ "$COVERAGE_INT" -lt 0 ]; then
              echo "Coverage (${COVERAGE}%) below threshold of 0%"
              exit 1
            fi
            echo "Coverage meets threshold"
          else
            echo "Coverage report not found"
            exit 1
          fi
      - name: TypeScript errors check
        run: |
          if [ -f reports/tsc-report.txt ]; then
            if grep -q "error TS" reports/tsc-report.txt; then
              echo "TypeScript has errors"
              grep "error TS" reports/tsc-report.txt | head -5
              exit 1
            fi
            echo "TypeScript check passed"
          else
            echo "TypeScript report not found"
            exit 1
          fi

  build:
    name: Vite Build
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm run build
      - name: Bundle budget check
        run: pnpm run build:budget
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  reports:
    name: Quality Reports
    needs: [lint, typecheck, coverage]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: '*-report'
          path: reports/
          merge-multiple: true
      - name: List reports
        run: ls -la reports/
      - name: Run code quality dashboard
        run: pnpm exec ts-node scripts/code-review-dashboard.ts --json
      - name: Upload all reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: reports/
          retention-days: 7
