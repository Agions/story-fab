name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '手动版本号（如 1.9.8）'
        required: true
        default: ''
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  attestations: write
  issues: write

env:
  APP_NAME: CutDeck
  VITE_APP_NAME: CutDeck
  VITE_APP_VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  # ─── macOS ────────────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build Tauri
        run: |
          echo "=== Rust version ==="
          rustc --version && cargo --version
          rustup target list --installed
          echo "===================="
          CODE_SIGN_IDENTITY="" AD_HOC_SIGNING=1 pnpm run tauri build 2>&1 | tee macos-build.log || true
          echo "---BUILD LOG TAIL---"
          tail -20 macos-build.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macos build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-log
          path: macos-build.log
          retention-days: 2

      - name: Package macOS app as zip
        run: |
          APP_BUNDLE="src-tauri/target/release/bundle/macos/CutDeck.app"
          echo "=== Bundle directory check ==="
          ls -la src-tauri/target/release/bundle/ 2>/dev/null && echo "---macos---" && ls -la "$APP_BUNDLE" 2>/dev/null && echo "Bundle found" || echo "Bundle NOT found"
          
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "ERROR: .app bundle not found at $APP_BUNDLE"
            ls -la src-tauri/target/release/bundle/macos/ 2>/dev/null || echo "macos dir missing"
            exit 1
          fi
          
          echo "Bundling with ditto..."
          cd "src-tauri/target/release/bundle/macos"
          ditto -c -k CutDeck.app ../CutDeck-macos.zip
          cd "${GITHUB_WORKSPACE}" || cd ../../..
          
          echo "=== Verifying ZIP ==="
          ls -lh src-tauri/target/release/bundle/CutDeck-macos.zip || echo "ZIP not created"

      - name: Upload macOS zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: CutDeck-macos-zip
          path: src-tauri/target/release/bundle/CutDeck-macos.zip
          retention-days: 5

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: CutDeck-macos-app
          path: src-tauri/target/release/bundle/macos/CutDeck.app
          retention-days: 5

  # ─── Windows ───────────────────────────────────────────────
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: nsis
            runner: windows-2022
          - format: msi
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build Tauri
        run: |
          echo "=== Windows build info ==="
          rustc --version && cargo --version
          rustup target list --installed
          echo "========================="
          pnpm run tauri build 2>&1 | tee windows-build.log || true
          echo "---BUILD LOG TAIL---"
          tail -20 windows-build.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload windows build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: windows-build.log
          retention-days: 2

      - name: Upload nsis artifact
        if: matrix.format == 'nsis'
        uses: actions/upload-artifact@v4
        with:
          name: CutDeck-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 5

      - name: Upload msi artifact
        if: matrix.format == 'msi'
        uses: actions/upload-artifact@v4
        with:
          name: CutDeck-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 5

  # ─── Linux ─────────────────────────────────────────────────
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: appimage
            runner: ubuntu-24.04
          - format: deb
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Rust version + Tauri info
        run: |
          rustc --version
          cargo --version
          rustup show
          pnpm run tauri build --debug 2>&1 | tee rust-build.log || true
          echo "---BUILD LOG TAIL---"
          tail -50 rust-build.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload rust-build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rust-build-log
          path: rust-build.log
          retention-days: 2

      - name: Upload AppImage artifact
        if: matrix.format == 'appimage'
        uses: actions/upload-artifact@v4
        with:
          name: CutDeck-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 5

      - name: Upload deb artifact
        if: matrix.format == 'deb'
        uses: actions/upload-artifact@v4
        with:
          name: CutDeck-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          retention-days: 5

  # ─── Universal Shell Installer ────────────────────────────
  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: List release files
        run: find release -type f | sort

      # ── Generate install.sh ─────────────────────────────
      - name: Generate Install Script
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          cat > release/install.sh << 'SCRIPT'
          #!/usr/bin/env bash
          # CutDeck One-Line Installer
          # Usage:
          #   curl -fsSL https://raw.githubusercontent.com/CutDeck/CutDeck/main/install.sh | bash -s -- 1.9.8
          #
          # Works on: macOS, Linux, Windows (Git Bash / WSL)

          set -e

          # ── Args ──────────────────────────────────────────
          VERSION="${1:-}"
          if [ -z "$VERSION" ]; then
            echo "❌ 请指定版本号，例如:"
            echo "   curl -fsSL https://raw.githubusercontent.com/CutDeck/CutDeck/main/install.sh | bash -s -- 1.9.8"
            exit 1
          fi

          REPO="CutDeck/CutDeck"
          INSTALL_DIR="${HOME}/Applications/CutDeck.app"
          TMPDIR="${TMPDIR:-/tmp}"
          ARTIFACT_DIR="${TMPDIR}/cutdeck-install"

          mkdir -p "$ARTIFACT_DIR"
          cd "$ARTIFACT_DIR"

          # ── Detect OS ────────────────────────────────────
          detect_os() {
            case "$(uname -s)" in
              Linux*)     echo "linux" ;;
              Darwin*)    echo "macos" ;;
              MINGW*|MSYS*|CYGWIN*) echo "windows" ;;
              *)          echo "unknown" ;;
            esac
          }

          download() {
            local artifact_path="$1"
            local filename="$2"
            local url="https://github.com/${REPO}/releases/download/${VERSION}/${artifact_path}"

            echo "⬇️  下载 $filename..."
            if ! curl -fLo "${ARTIFACT_DIR}/${filename}" -H "Accept: application/octet-stream" "$url"; then
              echo "❌ 下载失败: $url"
              exit 1
            fi
          }

          install_macos() {
            local zip="${ARTIFACT_DIR}/CutDeck-macos.zip"
            download "CutDeck-macos-zip/CutDeck-macos.zip" "CutDeck-macos.zip"

            echo "📦 解压到 Applications..."
            rm -rf "$INSTALL_DIR"
            unzip -q "$zip" -d "$(dirname "$INSTALL_DIR")"
            rm -f "$zip"

            echo "✅ 安装完成: ${INSTALL_DIR}"
            echo "   启动: open \"${INSTALL_DIR}\""
          }

          install_linux_appimage() {
            local appimage="${ARTIFACT_DIR}/CutDeck.AppImage"
            download "CutDeck-linux-appimage/CutDeck.AppImage" "CutDeck.AppImage"

            chmod +x "$appimage"

            BIN_DIR="${HOME}/.local/bin"
            mkdir -p "$BIN_DIR"
            mv "$appimage" "${BIN_DIR}/CutDeck"

            echo "✅ 安装完成: ${BIN_DIR}/CutDeck"
            echo "   运行: ${BIN_DIR}/CutDeck"
          }

          install_linux_deb() {
            local deb="${ARTIFACT_DIR}/cutdeck.deb"
            DEB_FILE=$(find release -name "*.deb" 2>/dev/null | head -1)
            if [ -z "$DEB_FILE" ]; then
              echo "❌ 未找到 deb 包，跳过..."
              return
            fi
            cp "$DEB_FILE" "$deb"
            sudo dpkg -i "$deb" || sudo apt-get -f install -y
            rm -f "$deb"
            echo "✅ 安装完成"
          }

          install_windows() {
            local exe=$(find release -name "*.exe" 2>/dev/null | head -1)
            if [ -z "$exe" ]; then
              echo "❌ 未找到 exe 安装包，跳过..."
              return
            fi
            echo "📦 运行安装程序: $exe"
            powershell -Command "Start-Process msiexec.exe -Wait -ArgumentList '/i', '$exe'"
            echo "✅ 安装完成"
          }

          # ── Main ──────────────────────────────────────────
          main() {
            local os=$(detect_os)
            echo "🖥️  系统: ${os}"
            echo "📦 版本: ${VERSION}"

            case "$os" in
              macos)  install_macos ;;
              linux)
                if curl -sfI "https://github.com/${REPO}/releases/download/${VERSION}/CutDeck-linux-appimage/CutDeck.AppImage" > /dev/null 2>&1; then
                  install_linux_appimage
                else
                  install_linux_deb
                fi
                ;;
              windows) install_windows ;;
              *)      echo "❌ 不支持的操作系统: ${os}" ; exit 1 ;;
            esac
          }

          main
          SCRIPT
          chmod +x release/install.sh

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## 📥 CutDeck ${{ github.event.inputs.version || github.ref_name }} 下载

            ### 🏠 Homebrew 风格一键安装（推荐）

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/CutDeck/CutDeck/main/install.sh | bash -s -- ${{ github.event.inputs.version || github.ref_name }}
            ```

            **Windows (PowerShell / Git Bash):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/CutDeck/CutDeck/main/install.sh | bash -s -- ${{ github.event.inputs.version || github.ref_name }}
            ```

            ### 各平台下载
            | 平台 | 格式 | 下载 |
            |------|------|------|
            | macOS | ZIP | `CutDeck-macos-zip/CutDeck-macos.zip` |
            | macOS | APP | `CutDeck-macos-app/CutDeck.app` |
            | Windows | NSIS | `CutDeck-windows-nsis/*.exe` |
            | Windows | MSI | `CutDeck-windows-msi/*.msi` |
            | Linux | AppImage | `CutDeck-linux-appimage/*.AppImage` |
            | Linux | DEB | `CutDeck-linux-deb/*.deb` |
          files: |
            release/**/*
            release/install.sh
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
