<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160" role="img" aria-label="StoryFab">
  <title>StoryFab — AI 影视解说创作工坊</title>
  <defs>
    <linearGradient id="sfMarkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="100%" stop-color="#1B1742"/>
    </linearGradient>
    <linearGradient id="sfMarkRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3D6E"/>
    </linearGradient>
  </defs>

  <!-- Mark (left, 128x128 padded) -->
  <g transform="translate(16 16)">
    <!-- Rounded square (matches app icon) -->
    <rect width="128" height="128" rx="28" ry="28" fill="url(#sfMarkBg)"/>

    <!-- Story loop ring (single, prominent) -->
    <circle cx="64" cy="64" r="40" fill="none" stroke="url(#sfMarkRing)" stroke-width="3.5"/>

    <!-- Center play triangle (offset right to balance visual weight) -->
    <path d="M 56 46 L 82 64 L 56 82 Z" fill="url(#sfMarkRing)"/>

    <!-- 4 corner film ticks (subtle, top + bottom) -->
    <g fill="url(#sfMarkRing)" opacity="0.55">
      <rect x="16" y="22" width="3" height="6" rx="1"/>
      <rect x="26" y="22" width="3" height="6" rx="1"/>
      <rect x="99" y="22" width="3" height="6" rx="1"/>
      <rect x="109" y="22" width="3" height="6" rx="1"/>
      <rect x="16" y="100" width="3" height="6" rx="1"/>
      <rect x="26" y="100" width="3" height="6" rx="1"/>
      <rect x="99" y="100" width="3" height="6" rx="1"/>
      <rect x="109" y="100" width="3" height="6" rx="1"/>
    </g>
  </g>

  <!-- Wordmark (right) -->
  <g transform="translate(168 0)">
    <text x="0" y="86"
          font-family="Inter, 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="58" font-weight="800" letter-spacing="-2"
          fill="#0F0C29">Story<tspan fill="url(#sfMarkRing)">Fab</tspan></text>
    <text x="3" y="118"
          font-family="Inter, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
          font-size="13" font-weight="600" letter-spacing="3.2"
          fill="#6B7280">AI · STORY · STUDIO</text>
  </g>
</svg>
