<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="StoryFab Icon">
  <title>StoryFab</title>
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F1F"/>
      <stop offset="100%" stop-color="#1A1F3A"/>
    </linearGradient>
    <linearGradient id="iconAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#iconBg)"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="url(#iconAccent)" stroke-width="2.5" stroke-opacity="0.3"/>

  <!-- Film strip (horizontal) -->
  <rect x="24" y="120" width="208" height="16" rx="2" fill="url(#iconAccent)" opacity="0.85"/>

  <!-- Film perforations -->
  <rect x="36" y="124" width="8" height="8" rx="1.5" fill="#0B0F1F"/>
  <rect x="56" y="124" width="8" height="8" rx="1.5" fill="#0B0F1F"/>
  <rect x="76" y="124" width="8" height="8" rx="1.5" fill="#0B0F1F"/>
  <rect x="96" y="124" width="8" height="8" rx="1.5" fill="#0B0F1F"/>
  <rect x="116" y="124" width="8" height="8" rx="1.5" fill="#0B0F1F"/>
  <rect x="136" y="124" width="8" height="8" rx="1.5" fill="#0B0F1F"/>
  <rect x="156" y="124" width="8" height="8" rx="1.5" fill="#0B0F1F"/>
  <rect x="176" y="124" width="8" height="8" rx="1.5" fill="#0B0F1F"/>
  <rect x="196" y="124" width="8" height="8" rx="1.5" fill="#0B0F1F"/>

  <!-- SF Monogram -->
  <g transform="translate(128 95)">
    <!-- S -->
    <path d="M -28 -18
             C -28 -28 -18 -32 -10 -32
             C -2 -32 8 -28 8 -18
             C 8 -8 -16 -4 -24 4
             C -32 12 -28 20 -28 32
             C -28 44 -18 48 -8 48
             C 2 48 14 44 22 36"
          fill="none" stroke="url(#iconAccent)" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- F -->
    <path d="M 18 -32 L 18 48 M 18 -32 L 42 -32 M 18 -2 L 38 -2"
          fill="none" stroke="#F8FAFC" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom play button indicator -->
  <polygon points="128,200 108,220 148,220" fill="url(#iconAccent)"/>
</svg>
