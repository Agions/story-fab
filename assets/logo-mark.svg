<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="StoryFab mark">
  <title>StoryFab</title>
  <defs>
    <linearGradient id="sfAppBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="100%" stop-color="#1B1742"/>
    </linearGradient>
    <linearGradient id="sfAppRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3D6E"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (iOS-friendly) -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#sfAppBg)"/>

  <!-- Outer film ring (dashed) -->
  <circle cx="128" cy="128" r="92" fill="none" stroke="url(#sfAppRing)" stroke-width="2.5" stroke-dasharray="3 6" opacity="0.5"/>

  <!-- Inner solid ring (story loop) -->
  <circle cx="128" cy="128" r="68" fill="none" stroke="url(#sfAppRing)" stroke-width="5"/>

  <!-- Center play triangle -->
  <path d="M 112 96 L 160 128 L 112 160 Z" fill="url(#sfAppRing)"/>

  <!-- Frame ticks (top + bottom film perforations) -->
  <g fill="url(#sfAppRing)" opacity="0.85">
    <rect x="36"  y="36"  width="4" height="10" rx="1.5"/>
    <rect x="56"  y="36"  width="4" height="10" rx="1.5"/>
    <rect x="76"  y="36"  width="4" height="10" rx="1.5"/>
    <rect x="176" y="36"  width="4" height="10" rx="1.5"/>
    <rect x="196" y="36"  width="4" height="10" rx="1.5"/>
    <rect x="216" y="36"  width="4" height="10" rx="1.5"/>
    <rect x="36"  y="210" width="4" height="10" rx="1.5"/>
    <rect x="56"  y="210" width="4" height="10" rx="1.5"/>
    <rect x="76"  y="210" width="4" height="10" rx="1.5"/>
    <rect x="176" y="210" width="4" height="10" rx="1.5"/>
    <rect x="196" y="210" width="4" height="10" rx="1.5"/>
    <rect x="216" y="210" width="4" height="10" rx="1.5"/>
  </g>
</svg>
