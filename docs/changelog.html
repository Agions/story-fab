  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg-base: #0c0a09; --bg-primary: #111110; --bg-secondary: #1a1918; --bg-tertiary: #272524; --border-subtle: #292524; --border-default: #3f3a36; --text-primary: #fafaf9; --text-secondary: #a8a29e; --text-tertiary: #78716c; --color-primary: #2563eb; --color-primary-light: #60a5fa; --color-accent: #f59e0b; --color-success: #10b981; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-base); color: var(--text-primary); line-height: 1.6; }
    .header { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(12,10,9,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle); z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-primary); }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--color-primary), var(--color-accent)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; fill: white; }
    .logo-text { font-family: 'Outfit', sans-serif; font-size: 1.125rem; font-weight: 700; }
    .header-nav { display: flex; align-items: center; gap: 8px; }
    .nav-link { padding: 8px 16px; color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; font-weight: 500; border-radius: var(--radius-md); transition: 200ms ease; }
    .nav-link:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .nav-link.active { color: var(--color-primary-light); background: rgba(37,99,235,0.1); }
    .github-link { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg-tertiary); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary); text-decoration: none; font-size: 0.875rem; font-weight: 500; margin-left: 16px; }
    .main { display: flex; margin-top: 64px; min-height: calc(100vh - 64px); }
    .sidebar { width: 280px; position: fixed; top: 64px; left: 0; bottom: 0; background: var(--bg-primary); border-right: 1px solid var(--border-subtle); overflow-y: auto; padding: 24px 16px; }
    .sidebar-section { margin-bottom: 24px; }
    .sidebar-title { font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); padding: 0 12px; margin-bottom: 8px; }
    .sidebar-list { list-style: none; }
    .sidebar-item a { display: block; padding: 8px 12px; color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; border-radius: var(--radius-md); transition: 200ms ease; }
    .sidebar-item a:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .sidebar-item a.active { color: var(--color-primary-light); background: rgba(37,99,235,0.1); }
    .content { flex: 1; margin-left: 280px; padding: 48px 64px; max-width: 900px; }
    h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 16px; color: var(--text-primary); }
    h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; margin: 48px 0 16px; padding-top: 48px; border-top: 1px solid var(--border-subtle); color: var(--text-primary); }
    h2:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
    p { color: var(--text-secondary); margin-bottom: 16px; font-size: 0.9375rem; }
    a { color: var(--color-primary-light); text-decoration: none; } a:hover { text-decoration: underline; }
    .release { background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 24px; margin-bottom: 24px; }
    .release-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .release-version { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }
    .release-date { color: var(--text-tertiary); font-size: 0.875rem; }
    .release-badge { display: inline-block; padding: 4px 10px; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: var(--radius-full); color: var(--color-accent); font-size: 0.75rem; font-weight: 600; }
    .release-list { list-style: none; }
    .release-list li { padding: 6px 0; color: var(--text-secondary); font-size: 0.875rem; }
    .release-list li::before { content: "•"; color: var(--color-primary-light); margin-right: 10px; }
    @media (max-width: 768px) { .sidebar { display: none; } .content { margin-left: 0; padding: 24px; } .header { padding: 0 16px; } }
    ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--bg-secondary); } ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }
  </style>
