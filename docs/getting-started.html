    <h1>快速开始</h1>
    <p>本指南将帮助你在 5 分钟内启动 StoryForge 项目。</p>
    
    <h2>环境要求</h2>
    <table>
      <tr><th>要求</th><th>版本</th></tr>
      <tr><td>Node.js</td><td>≥ 18.0.0</td></tr>
      <tr><td>npm</td><td>≥ 9.0.0</td></tr>
      <tr><td>Git</td><td>≥ 2.30.0</td></tr>
    </table>
    
    <h2>安装步骤</h2>
    <h3>1. 克隆项目</h3>
    <pre><code>git clone https://github.com/Agions/StoryForge.git
cd StoryForge</code></pre>
    
    <h3>2. 安装依赖</h3>
    <pre><code>npm install</code></pre>
    
    <h3>3. 启动开发服务器</h3>
    <pre><code>npm run dev</code></pre>
    
    <h2>下一步</h2>
    <p>现在你可以开始使用 StoryForge 了！</p>
