<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipFlow Docs</title>
    <meta
      name="description"
      content="ClipFlow 在线文档：安装部署、项目流程、AI 模型配置、常见问题与版本说明。"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <style>
      :root {
        --theme-color: #1768ff;
      }
      .app-name img {
        max-width: 28px;
        margin-right: 8px;
      }
      .markdown-section {
        max-width: 980px;
      }
      .cover-main > p:last-child a {
        border-radius: 8px;
      }
      .sidebar ul li.active > a {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="app">文档加载中...</div>
    <script>
      window.$docsify = {
        name: 'ClipFlow 文档',
        repo: 'https://github.com/agions/clipflow',
        loadSidebar: true,
        loadNavbar: true,
        subMaxLevel: 2,
        auto2top: true,
        maxLevel: 3,
        search: {
          placeholder: '搜索文档',
          noData: '没有找到相关内容',
          depth: 4,
        },
        pagination: {
          previousText: '上一页',
          nextText: '下一页',
          crossChapter: true,
        },
        copyCode: {
          buttonText: '复制',
          errorText: '失败',
          successText: '已复制',
        },
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  </body>
</html>
