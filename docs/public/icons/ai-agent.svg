<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="AI Agent Icon">
  <title>AI智能解说</title>
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0B0F1F"/>
  <!-- Brain/AI circuit pattern -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="url(#aiGrad)" stroke-width="2"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="url(#aiGrad)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="32" cy="32" r="4" fill="url(#aiGrad)"/>
  <!-- Circuit lines -->
  <line x1="32" y1="12" x2="32" y2="20" stroke="#EC4899" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="32" y2="52" stroke="#EC4899" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="20" y2="32" stroke="#EC4899" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="52" y2="32" stroke="#EC4899" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Connection dots -->
  <circle cx="32" cy="12" r="2" fill="#F59E0B"/>
  <circle cx="32" cy="52" r="2" fill="#F59E0B"/>
  <circle cx="12" cy="32" r="2" fill="#F59E0B"/>
  <circle cx="52" cy="32" r="2" fill="#F59E0B"/>
</svg>
