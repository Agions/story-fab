<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="StoryFab mark">
  <title>StoryFab</title>
  <defs>
    <linearGradient id="sfBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F1F"/>
      <stop offset="100%" stop-color="#1A1F3A"/>
    </linearGradient>
    <linearGradient id="sfAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="sfFilm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#sfBg)"/>

  <!-- Outer story ring (curved type, gradient stroke) -->
  <circle cx="128" cy="128" r="92" fill="none" stroke="url(#sfAccent)" stroke-width="3" stroke-opacity="0.35"/>

  <!-- Curved film strip across the middle -->
  <g transform="translate(0 0)">
    <rect x="32" y="116" width="192" height="24" rx="3" fill="url(#sfFilm)"/>
    <rect x="40" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="54" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="68" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="82" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="96" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="110" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="124" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="138" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="152" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="166" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="180" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
    <rect x="194" y="120" width="6" height="16" rx="1.5" fill="#0B0F1F" opacity="0.9"/>
  </g>

  <!-- Center monogram: SF -->
  <g transform="translate(128 128)">
    <!-- S -->
    <path d="M -34 -22
             C -34 -34 -22 -38 -12 -38
             C -2 -38 8 -34 8 -22
             C 8 -10 -8 -6 -16 0
             C -24 6 -34 10 -34 22
             C -34 34 -22 38 -10 38
             C 0 38 12 34 18 26"
          fill="none" stroke="url(#sfAccent)" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- F -->
    <path d="M 14 -38 L 14 38 M 14 -38 L 40 -38 M 14 -2 L 34 -2"
          fill="none" stroke="#F8FAFC" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small play indicator (bottom right corner dot) -->
  <circle cx="200" cy="200" r="6" fill="url(#sfAccent)"/>
</svg>