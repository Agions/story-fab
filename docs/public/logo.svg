<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <!-- Dark cinematic background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
    <!-- Amber glow from top-right -->
    <radialGradient id="amberGlow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Cyan accent glow bottom-left -->
    <radialGradient id="cyanGlow" cx="20%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Cut line gradient (amber to transparent) -->
    <linearGradient id="cutGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <!-- Film frame gradient -->
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a4a"/>
      <stop offset="100%" stop-color="#1e1e38"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="160" height="160" rx="24" fill="url(#bgGrad)"/>
  <rect width="160" height="160" rx="24" fill="url(#amberGlow)"/>
  <rect width="160" height="160" rx="24" fill="url(#cyanGlow)"/>

  <!-- Film strip sprocket holes (left side) -->
  <g fill="#f59e0b" opacity="0.25">
    <rect x="22" y="28" width="8" height="5" rx="1.5"/>
    <rect x="22" y="42" width="8" height="5" rx="1.5"/>
    <rect x="22" y="56" width="8" height="5" rx="1.5"/>
    <rect x="22" y="70" width="8" height="5" rx="1.5"/>
    <rect x="22" y="84" width="8" height="5" rx="1.5"/>
    <rect x="22" y="98" width="8" height="5" rx="1.5"/>
    <rect x="22" y="112" width="8" height="5" rx="1.5"/>
  </g>
  <!-- Film strip sprocket holes (right side) -->
  <g fill="#f59e0b" opacity="0.25">
    <rect x="130" y="28" width="8" height="5" rx="1.5"/>
    <rect x="130" y="42" width="8" height="5" rx="1.5"/>
    <rect x="130" y="56" width="8" height="5" rx="1.5"/>
    <rect x="130" y="70" width="8" height="5" rx="1.5"/>
    <rect x="130" y="84" width="8" height="5" rx="1.5"/>
    <rect x="130" y="98" width="8" height="5" rx="1.5"/>
    <rect x="130" y="112" width="8" height="5" rx="1.5"/>
  </g>

  <!-- Main film frame -->
  <rect x="38" y="24" width="84" height="84" rx="6" fill="url(#frameGrad)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Play triangle in center (white to amber) -->
  <polygon points="68,50 104,68 68,86" fill="url(#playGrad)"/>
  <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#fcd34d"/>
  </linearGradient>

  <!-- Diagonal cut line through frame (amber blade) -->
  <line x1="38" y1="108" x2="122" y2="24"
        stroke="url(#cutGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Cut indicator dots at cut line endpoints -->
  <circle cx="38" cy="108" r="4" fill="#f59e0b"/>
  <circle cx="122" cy="24" r="4" fill="#06b6d4"/>

  <!-- "CUTDECK" wordmark -->
  <text x="80" y="136"
        text-anchor="middle"
        font-family="'Syne', 'Inter', system-ui, sans-serif"
        font-size="12"
        font-weight="800"
        letter-spacing="0.15em"
        fill="#f8fafc">CUTDECK</text>

  <!-- Subtle bottom border accent -->
  <rect x="50" y="146" width="60" height="1.5" rx="0.75" fill="#f59e0b" opacity="0.4"/>
</svg>
