<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="StoryFab">
  <title>StoryFab</title>
  <defs>
    <linearGradient id="sfFavBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="100%" stop-color="#1B1742"/>
    </linearGradient>
    <linearGradient id="sfFavRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3D6E"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#sfFavBg)"/>

  <!-- Solid ring -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="url(#sfFavRing)" stroke-width="2.5"/>

  <!-- Play triangle -->
  <path d="M 28 24 L 40 32 L 28 40 Z" fill="url(#sfFavRing)"/>

  <!-- Top + bottom ticks -->
  <g fill="url(#sfFavRing)" opacity="0.85">
    <rect x="14" y="6"  width="1.5" height="4" rx="0.5"/>
    <rect x="22" y="6"  width="1.5" height="4" rx="0.5"/>
    <rect x="40" y="6"  width="1.5" height="4" rx="0.5"/>
    <rect x="48" y="6"  width="1.5" height="4" rx="0.5"/>
    <rect x="14" y="54" width="1.5" height="4" rx="0.5"/>
    <rect x="22" y="54" width="1.5" height="4" rx="0.5"/>
    <rect x="40" y="54" width="1.5" height="4" rx="0.5"/>
    <rect x="48" y="54" width="1.5" height="4" rx="0.5"/>
  </g>
</svg>
