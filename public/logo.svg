<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="StoryFab mark">
  <title>StoryFab</title>
  <defs>
    <linearGradient id="sfAppBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="100%" stop-color="#1B1742"/>
    </linearGradient>
    <linearGradient id="sfAppRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3D6E"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#sfAppBg)"/>

  <!-- Single story loop ring -->
  <circle cx="128" cy="128" r="80" fill="none" stroke="url(#sfAppRing)" stroke-width="6"/>

  <!-- Play triangle (optically centered) -->
  <path d="M 112 92 L 168 128 L 112 164 Z" fill="url(#sfAppRing)"/>

  <!-- 8 film ticks (4 corners, subtle) -->
  <g fill="url(#sfAppRing)" opacity="0.5">
    <rect x="32"  y="42"  width="5" height="10" rx="1.5"/>
    <rect x="52"  y="42"  width="5" height="10" rx="1.5"/>
    <rect x="199" y="42"  width="5" height="10" rx="1.5"/>
    <rect x="219" y="42"  width="5" height="10" rx="1.5"/>
    <rect x="32"  y="204" width="5" height="10" rx="1.5"/>
    <rect x="52"  y="204" width="5" height="10" rx="1.5"/>
    <rect x="199" y="204" width="5" height="10" rx="1.5"/>
    <rect x="219" y="204" width="5" height="10" rx="1.5"/>
  </g>
</svg>
