<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="CutDeck logo">
  <title>CutDeck</title>
  <desc>AI-powered professional video editing tool logo — film frame with play button and lightning bolt</desc>
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#0f0f17"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#darkGrad)"/>

  <!-- Timeline grid lines (subtle) -->
  <g stroke="#2a2a3e" stroke-width="1" fill="none" opacity="0.6">
    <line x1="80" y1="420" x2="432" y2="420"/>
    <line x1="80" y1="388" x2="432" y2="388"/>
    <line x1="80" y1="356" x2="432" y2="356"/>
    <line x1="80" y1="324" x2="432" y2="324"/>
    <line x1="80" y1="292" x2="432" y2="292"/>
    <line x1="80" y1="260" x2="432" y2="260"/>
  </g>

  <!-- Film frame with orange stroke -->
  <g filter="url(#glow)">
    <rect x="120" y="118" width="272" height="200" rx="16"
          fill="#1a1a2e" stroke="url(#brandGrad)" stroke-width="8"/>
    
    <!-- Top sprocket holes -->
    <rect x="148" y="134" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>
    <rect x="193" y="134" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>
    <rect x="238" y="134" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>
    <rect x="283" y="134" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>
    <rect x="328" y="134" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>

    <!-- Bottom sprocket holes -->
    <rect x="148" y="284" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>
    <rect x="193" y="284" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>
    <rect x="238" y="284" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>
    <rect x="283" y="284" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>
    <rect x="328" y="284" width="18" height="22" rx="4" fill="url(#brandGrad)" opacity="0.85"/>

    <!-- Play button -->
    <path d="M218 186 L316 218 L218 250 Z" fill="url(#brandGrad)"/>
  </g>

  <!-- AI lightning bolt -->
  <g filter="url(#glow)">
    <path d="M362 218 L330 266 L356 266 L332 338 L392 258 L360 258 Z"
          fill="#fb923c" stroke="#fdba74" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- Accent dot -->
  <circle cx="382" cy="138" r="9" fill="#fb923c" opacity="0.75" filter="url(#glow)"/>
</svg>
